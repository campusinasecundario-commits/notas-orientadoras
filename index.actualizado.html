<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consulta de Notas Orientadoras</title>
<style>
*{box-sizing:border-box}
/*body{
  margin:0; min-height:100vh; font-family:Arial, Helvetica, sans-serif;
  background:linear-gradient(135deg,#0f4c81,#1e90ff); padding:24px;
  display:flex; align-items:center; justify-content:center;
}*/

body{
  margin:0;
  min-height:100vh;

  background:
    linear-gradient(
      rgba(0,0,0,0.35),
      rgba(0,0,0,0.35)
    ),
    url('fondo.jpg');

  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
  background-attachment:fixed;
  display:flex; align-items:center; justify-content:center;
}

.contenedor{
  width:100%; max-width:660px; background:#fff; border-radius:18px;
  padding:28px; box-shadow:0 16px 40px rgba(0,0,0,.25); text-align:center;
}
.logo{width:125px; height:auto; display:block; margin:0 auto 14px auto;}
h1{margin:0 0 8px; color:#0f4c81; font-size:30px}
p{color:#444; line-height:1.45}
input{
  width:100%; padding:15px; margin:16px 0 10px; border:2px solid #d7dce2;
  border-radius:12px; font-size:20px; text-align:center; outline:none; text-transform:uppercase;
}
input:focus{border-color:#1e90ff}
button{
  width:100%; border:none; border-radius:12px; padding:15px 18px; font-size:18px;
  font-weight:bold; cursor:pointer; background:#0f4c81; color:white;
}
button:hover{background:#0a3a63}
#resultado{margin-top:18px; min-height:70px}
.card{border:1px solid #e5e7eb; border-radius:14px; padding:18px; background:#fafafa}
.nombre{font-size:19px; font-weight:bold; color:#111827; margin-bottom:8px}
.curso{font-size:16px; color:#0f4c81; font-weight:bold; margin-bottom:8px}
.archivo{font-size:14px; color:#6b7280; margin-bottom:14px}
a.descargar{
  display:block; width:100%; background:#16a34a; color:white; text-decoration:none;
  padding:15px 18px; border-radius:12px; font-weight:bold; font-size:18px;
}
a.descargar:hover{background:#15803d}
.error{color:#b91c1c; background:#fee2e2; border-radius:12px; padding:14px; font-weight:bold}
.pie{margin-top:22px; color:#777; font-size:18px}
.contador{margin-top:8px; color:#666; font-size:13px}
@media(max-width:480px){body{padding:14px} .contenedor{padding:22px} h1{font-size:25px} .logo{width:105px}}
</style>
</head>

function normalizarCodigo(valor) {
  return String(valor || '').trim().replace(/\s+/g, '').toUpperCase();
}

function escaparHTML(texto) {
  return String(texto || '')
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#039;');
}

function buscarLibreta() {
  const codigo = normalizarCodigo(document.getElementById('codigo').value);
  const resultado = document.getElementById('resultado');
  if (!codigo) {
    resultado.innerHTML = '<div class="error">Ingrese un código.</div>';
    return;
  }
  const libreta = libretas[codigo];
  if (!libreta) {
    resultado.innerHTML = '<div class="error">Código no encontrado. Verifique el dato ingresado.</div>';
    return;
  }
  resultado.innerHTML = `
    <div class="card">
      <div class="nombre">Alumno: ${escaparHTML(libreta.nombre)}</div>
      <div class="curso">Curso: ${escaparHTML(libreta.curso)}</div>
      <div class="archivo">Archivo: ${escaparHTML(libreta.archivo)}</div>
      <a class="descargar" href="${libreta.pdf}" target="_blank" rel="noopener">📥 Descargar Notas Orientadoras</a>
    </div>`;
}

document.getElementById('codigo').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') buscarLibreta();
});
